<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système A.B.C. - Assiette Bas Carbone 🍽️</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #18bc9c;
            --accent: #e74c3c;
            --bg: #ecf0f1;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        header { background-color: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        header p { margin: 5px 0 0 0; font-size: 14px; opacity: 0.8; }
        
        .nav-tabs { display: flex; justify-content: center; background: #34495e; padding: 0; margin: 0; list-style: none; }
        .nav-tabs li { padding: 15px 25px; color: #fff; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .nav-tabs li:hover { background: #4e6a85; }
        .nav-tabs li.active { background: var(--secondary); }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .card { background: var(--card-bg); padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border: 1px solid #dce4ec; }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        select, input, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #bdc3c7; border-radius: 6px; font-size: 16px; transition: border 0.2s; }
        select:focus, input:focus, textarea:focus { border-color: var(--secondary); outline: none; }
        
        .grid-categories { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .category-btn { background: #f8f9fa; border: 2px solid #bdc3c7; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .category-btn:hover { border-color: var(--secondary); background: #f0fdf4; }
        .category-btn.selected { background: var(--secondary); color: white; border-color: var(--secondary); box-shadow: 0 4px 10px rgba(24, 188, 156, 0.3); }

        button.btn-submit { width: 100%; padding: 15px; background-color: var(--secondary); color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; transition: background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button.btn-submit:hover { background-color: #128f76; }
        
        #status-message { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <header>
        <h1>Système A.B.C. — Assiette Bas Carbone</h1>
        <p>Interface Intégrée Globale : Borne de Pesée & Pilotage Éco-Citoyen</p>
    </header>

    <ul class="nav-tabs">
        <li class="active" onclick="switchTab('borne')">🍽️ Mode Borne</li>
        <li onclick="switchTab('cuisine')">👨‍🍳 Espace Cuisine</li>
    </ul>

    <div class="container">
        <div id="status-message"></div>

        <!-- ONGLET 1 : MODE BORNE DE SCAN (POUR LES ELEVES) -->
        <div id="tab-borne" class="tab-content active">
            <div class="card">
                <h2>Enregistrement du Gaspillage</h2>
                
                <div class="form-group">
                    <label for="borne-ecole">Établissement scolaire :</label>
                    <select id="borne-ecole">
                        <option value="">🔄 Chargement des établissements...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="borne-service">Service en cours :</label>
                    <select id="borne-service">
                        <option value="Service 1">Premier Service</option>
                        <option value="Service 2">Deuxième Service</option>
                    </select>
                </div>

                <label>Sélectionnez la catégorie d'aliment :</label>
                <div class="grid-categories">
                    <div class="category-btn" onclick="selectCategory(this, 'Crudités')">🥗 Crudités</div>
                    <div class="category-btn" onclick="selectCategory(this, 'Plat')">🍗 Plat Principal</div>
                    <div class="category-btn" onclick="selectCategory(this, 'Dessert')">🍰 Dessert</div>
                    <div class="category-btn" onclick="selectCategory(this, 'Pain')">🥖 Pain</div>
                </div>

                <div class="form-group">
                    <label for="borne-poids">Poids mesuré sur la balance (en kg) :</label>
                    <input type="number" id="borne-poids" step="0.01" min="0" placeholder="Ex: 0.35">
                </div>

                <button class="btn-submit" onclick="soumettreScan()">Valider la Pesée et Analyser 🚀</button>
            </div>
        </div>

        <!-- ONGLET 2 : ESPACE CUISINE / SAISIE MENUS & EFFECTIFS -->
        <div id="tab-cuisine" class="tab-content">
            <div class="card">
                <h2>Administration Quotidienne Cuisine</h2>
                
                <div class="form-group">
                    <label for="cuisine-ecole">Établissement :</label>
                    <select id="cuisine-ecole">
                        <option value="">🔄 Chargement des établissements...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cuisine-effectif">Effectif / Nombre d'élèves attendus :</label>
                    <input type="number" id="cuisine-effectif" min="0" placeholder="Ex: 450">
                </div>

                <div class="form-group">
                    <label for="cuisine-menu">Menu du jour (Détail des composants) :</label>
                    <textarea id="cuisine-menu" rows="4" placeholder="Ex: Salade de tomates locales, Rôti de porc/lentilles, Pomme AOP..."></textarea>
                </div>

                <button class="btn-submit" style="background-color: var(--primary);" onclick="soumettreCuisine()">Enregistrer les Données Cuisine 📝</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION UNIFIÉE DU BACKEND GOOGLE APPS SCRIPT
        const ADRESSE_SHEET_OFFICIELLE = "https://script.google.com/macros/s/AKfycbxGxucOMNYRXRUBySaYOXuP13ut2vNEM0ZFvEyM9DmVPJG0IhmJiwb2Zzzd-Kwq_6U_cw/exec";
        
        let selectedCategoryStr = "";

        // Chargement automatique au démarrage
        window.onload = function() {
            chargerEtablissements();
        };

        // Navigation entre onglets Borne et Cuisine
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-tabs li').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tabName).classList.add('active');
            event.currentTarget.classList.add('active');
            masquerStatut();
        }

        // Gestion de la sélection visuelle des boutons catégories
        function selectCategory(element, value) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            selectedCategoryStr = value;
        }

        // Récupération automatique des écoles configurées dans le Google Sheet
        function chargerEtablissements() {
            fetch(ADRESSE_SHEET_OFFICIELLE)
                .then(response => response.json())
                .then(data => {
                    const dropdowns = [document.getElementById('borne-ecole'), document.getElementById('cuisine-ecole')];
                    dropdowns.forEach(select => {
                        select.innerHTML = '<option value="">-- Choisissez un établissement --</option>';
                        data.forEach(ecole => {
                            let opt = document.createElement('option');
                            opt.value = ecole;
                            opt.textContent = ecole;
                            select.appendChild(opt);
                        });
                    });
                })
                .catch(err => {
                    console.error("Erreur d'initialisation des écoles:", err);
                    afficherStatut("Impossible de charger la liste depuis Google Sheets. Mode de secours activé.", "error");
                    
                    // Liste de secours au cas où la liaison initiale échoue
                    const backupList = ["COLLEGE J. GI", "COLLEGE V. SCHOELCHER"];
                    [document.getElementById('borne-ecole'), document.getElementById('cuisine-ecole')].forEach(select => {
                        select.innerHTML = '<option value="">-- Choisissez un établissement --</option>';
                        backupList.forEach(e => select.innerHTML += `<option value="${e}">${e}</option>`);
                    });
                });
        }

        // Envoi des données de pesée (Routage : Suivi_Gaspillage & traitement Dify)
        function soumettreScan() {
            const ecole = document.getElementById('borne-ecole').value;
            const service = document.getElementById('borne-service').value;
            const poids = parseFloat(document.getElementById('borne-poids').value);

            if (!ecole || !selectedCategoryStr || isNaN(poids)) {
                afficherStatut("⚠️ Veuillez remplir tous les champs : Établissement, Catégorie et Poids.", "error");
                return;
            }

            afficherStatut("⏳ Transmission de la pesée en cours (Calculs IA et logs)...", "");

            const payload = {
                action: "logScan",
                ecole: ecole,
                service: service,
                categorie: selectedCategoryStr,
                poids: poids,
                perte_economique: parseFloat((poids * 2.25).toFixed(2)),
                co2: parseFloat((poids * 1.5).toFixed(2))
            };

            executerPost(payload, "Pesée enregistrée ! Les onglets du tableur ont été mis à jour.");
        }

        // Envoi des informations saisies par le chef de cuisine
        function soumettreCuisine() {
            const ecole = document.getElementById('cuisine-ecole').value;
            const effectif = parseInt(document.getElementById('cuisine-effectif').value);
            const menu = document.getElementById('cuisine-menu').value;

            if (!ecole || isNaN(effectif) || !menu) {
                afficherStatut("⚠️ Veuillez compléter l'établissement, l'effectif et le menu du jour.", "error");
                return;
            }

            afficherStatut("⏳ Synchronisation des données cuisine...", "");

            const payload = {
                action: "logMenu",
                ecole: ecole,
                effectif: effectif,
                menu: menu
            };

            executerPost(payload, "Données de la cuisine synchronisées avec succès !");
        }

        // Fonction pivot pour envoyer les requêtes POST au Google Apps Script
        function executerPost(payload, messageSucces) {
            fetch(ADRESSE_SHEET_OFFICIELLE, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                afficherStatut(`✅ ${messageSucces}`, "success");
                document.getElementById('borne-poids').value = "";
                // Décocher la catégorie visuellement
                document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('selected'));
                selectedCategoryStr = "";
            })
            .catch(err => {
                afficherStatut("❌ Erreur réseau lors de la communication : " + err, "error");
            });
        }

        function afficherStatut(msg, type) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.style.display = 'block';
            statusDiv.className = type;
            statusDiv.textContent = msg;
        }

        function masquerStatut() {
            document.getElementById('status-message').style.display = 'none';
        }
    </script>
</body>
</html>
