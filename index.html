<!-- SCRIPTS DE LOGIQUE ET DE GRAPHISMES -->
    <script>
        document.getElementById('live-date').innerText = new Date().toLocaleDateString('fr-FR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Gestion de la navigation
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            const activeItem = Array.from(document.querySelectorAll('.menu-item')).find(item => item.getAttribute('onclick').includes(viewId));
            if(activeItem) activeItem.classList.add('active');
        }

        // Sauvegarde de l'URL Google Script
        function saveConfig() {
            const url = document.getElementById('cfg-sheet-url').value;
            localStorage.setItem('nb_sheet_url', url);
            alert('Lien avec Google Sheet configuré !');
        }
        // GRAVÉ DANS LE MARBRE : URL Jean Giono par défaut si la mémoire locale est vide
        document.getElementById('cfg-sheet-url').value = localStorage.getItem('nb_sheet_url') || 'https://script.google.com/macros/s/AKfycbxGxucOMNYRXRUBySaYOXuP13ut2vNEM0ZFvEyM9DmVPJG0IhmJiwb2Zzzd-Kwq_6U_cw/exec';

        // Enregistrement du menu par le cuisinier
        function saveMenu() {
            const menu = `${document.getElementById('menu-entree').value} / ${document.getElementById('menu-plat').value} / ${document.getElementById('menu-feculent').value}`;
            document.getElementById('borne-menu-active').innerText = menu;
            alert('Service initialisé avec le menu du jour !');
            switchView('view-borne');
        }

        // Déclenchement photo smartphone
        function triggerCapture() { document.getElementById('file-fallback').click(); }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('viewfinder-text').style.display = 'none';
                const img = document.getElementById('preview-img');
                img.src = e.target.result;
                img.style.display = 'block';
                
                sendToAutomationPipeline();
            };
            reader.readAsDataURL(file);
        }

        // Envoi automatique des données au Google Sheet de test
        function sendToAutomationPipeline() {
            const status = document.getElementById('status-indicator');
            status.innerText = "Analyse IA et synchronisation...";
            status.className = "status-badge status-processing";

            // GRAVÉ DANS LE MARBRE : Deuxième sécurité pour l'envoi direct
            const scriptUrl = localStorage.getItem('nb_sheet_url') || 'https://script.google.com/macros/s/AKfycbxGxucOMNYRXRUBySaYOXuP13ut2vNEM0ZFvEyM9DmVPJG0IhmJiwb2Zzzd-Kwq_6U_cw/exec';
            if(!scriptUrl) {
                setTimeout(() => {
                    alert("Attention : Aucune URL Google Sheet configurée. Mode démo activé !");
                    status.innerText = "Prêt à scanner";
                    status.className = "status-badge status-ready";
                }, 1000);
                return;
            }

            // Simulation de données extraites par l'IA (en attendant le branchement Dify final)
            const payload = {
                menu_jour: document.getElementById('borne-menu-active').innerText,
                entree_pct: Math.floor(Math.random() * 50),
                plat_pct: Math.floor(Math.random() * 30),
                feculent_pct: Math.floor(Math.random() * 70),
                pain_nombre: Math.floor(Math.random() * 3),
                poids_total_g: Math.floor(Math.random() * 200),
                perte_euro: (Math.random() * 1.5).toFixed(2)
            };

            // Envoi transparent et asynchrone au Google Sheet
            fetch(scriptUrl, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                status.innerText = "Plateau validé ! Videz vos restes.";
                status.className = "status-badge status-ready";
                setTimeout(() => { switchView('view-dashboard'); }, 1000);
            }).catch(err => {
                alert("Erreur lors de l'envoi auto : " + err);
                status.className = "status-badge status-ready";
            });
        }

        // --- APPARITION DES GRAPHIQUES (STYLE KIKLEO) ---
        new Chart(document.getElementById('chart-timeline').getContext('2d'), {
            type: 'line',
            data: {
                labels: ['Lundi', 'Mardi', 'Jeudi', 'Vendredi'],
                datasets: [{
                    label: 'Gaspillage moyen (g)',
                    data: [45, 38, 52, 43],
                    borderColor: '#2d6a4f',
                    backgroundColor: 'rgba(45, 106, 79, 0.1)',
                    tension: 0.2,
                    fill: true
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        new Chart(document.getElementById('chart-categories').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['Crudités', 'Féculents', 'Légumes', 'Viandes', 'Pain'],
                datasets: [{
                    data: [25.5, 24.0, 19.1, 9.7, 7.3],
                    backgroundColor: ['#48cae4', '#ffb703', '#2a9d8f', '#e63946', '#a8dadc']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
